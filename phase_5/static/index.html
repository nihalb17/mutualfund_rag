<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutual Fund AI Support</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="chat-container" id="chat-container">
        <!-- Chat bubbles will appear here -->
        <div class="msg-row assistant">
            <div class="msg-bubble">
                Hi! I'm your Mutual Fund Assistant. How can I help you regarding Axis Mutual Fund schemes today?
            </div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <div class="hamburger-menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
            <input type="text" id="user-input" placeholder="Say something..." autocomplete="off">
        </div>
        <div class="beta-tag">Beta</div>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
